name: CI/CD Pipeline Build and Push Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Bước 1 - Checkout code
        uses: actions/checkout@v4

      # Thêm bước này để hỗ trợ build image ổn định hơn
      - name: Bước 2 - Thiết lập Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bước 3 - Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Bước 4 - Đóng gói & Đẩy Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Thêm cache để lần sau build nhanh hơn, giảm tải cho server
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: thienhoang13/app-cua-thien:latest
          
      - name: Bước 5 - Triển khai lên DevOps Classroom
        run: |
          REPO="thienhoang13/app-cua-thien"
          CONTAINER_PORT=8080
          # Thêm --connect-timeout và --max-time để tránh lỗi 502 do server phản hồi chậm
          RESPONSE=$(curl -sS --connect-timeout 30 --max-time 300 -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=4&container_port=$CONTAINER_PORT&strict_container_port=0")
          
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Webhook HTTP: $CODE"
          
          if [ "$CODE" -eq 502 ]; then
            echo "Lỗi 502: Server DevOps Classroom đang quá tải hoặc đang khởi động lại. Thiện hãy đợi 5 phút rồi nhấn 'Re-run all jobs' nhé!"
            exit 1
          fi

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          
          echo "Deploy thành công lên DevOps Classroom!"
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
