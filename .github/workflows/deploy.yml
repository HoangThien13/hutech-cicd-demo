name: CI/CD Pipeline Build and Push Docker

on:
  push:
    branches: [ "main" ] # Chạy kịch bản khi có code đẩy lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Mượn máy ảo Ubuntu của GitHub để chạy
    
    steps:
      - name: Bước 1 - Checkout code
        uses: actions/checkout@v4 # Action lấy code từ Github

      - name: Bước 2 - Đăng nhập Docker Hub
        uses: docker/login-action@v3 # Action Đăng nhập Docker Hub
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Bước 3 - Đóng gói & Đẩy Image lên Docker Hub
        uses: docker/build-push-action@v5 # Action Đóng gói & Đẩy Image
        with:
          context: .
          push: true
          # LƯU Ý: Đổi chữ 'hoangthien13' bên dưới thành đúng username Docker Hub của bạn
          tags: hoangthien13/app-cua-thien:latest
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="hoangthien13/app-cua-thien:latest"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=4&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
